spring.application.name=tournament
server.port=8081

# SQLite datasource
# Path is overridable via the TOURNAMENT_DB_PATH env var (release);
# defaults to ./database (relative to the working dir) for local dev.
spring.datasource.url=jdbc:sqlite:${TOURNAMENT_DB_PATH:./database/tournament.db}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:/db/master.xml

# Angular build output served as static content
spring.web.resources.static-locations=classpath:/static/
