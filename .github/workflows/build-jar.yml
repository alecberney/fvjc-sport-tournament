name: Build Jar

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-jar:
    name: Build & commit jar
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build jar
        run: ./mvnw --batch-mode package

      - name: Copy jar to root dist folder
        run: |
          mkdir -p ../dist
          rm -f ../dist/*.jar
          cp target/*.jar ../dist/

      - name: Commit and push jar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ../dist
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "chore: update built jar [skip ci]"
          git push
