name: Release Jar

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-jar:
    name: Build & attach jar to release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build jar
        run: ./mvnw --batch-mode package

      # Attach the freshly built jar to the release for this tag, creating the
      # release if it does not exist yet. --clobber replaces an existing asset.
      - name: Publish jar to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes "Automated release build."
          gh release upload "$GITHUB_REF_NAME" target/*.jar --clobber
